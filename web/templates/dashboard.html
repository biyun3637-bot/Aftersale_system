<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent + RPA · 跨境售后系统</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
  <h1>AI Agent + RPA 混合架构 · 售后处理 Demo</h1>
  <span class="badge">DEMO</span>
</div>

<div class="container">
  <div class="row">
    <div class="col">
      <div class="card">
        <h3>1. 模拟客户消息</h3>
        <textarea id="messageInput" class="form-input" placeholder="Type a customer message in English...">I didn't receive my order, want refund</textarea>
        <div style="margin-top: 8px;">
          <input id="orderIdInput" class="form-input" placeholder="Order ID (optional, e.g. ORD-002)" style="font-size:13px;padding:8px 12px;">
        </div>
        <div style="margin-top: 12px;">
          <button class="btn btn-primary" onclick="process()">🚀 执行处理流程</button>
          <button class="btn btn-secondary" onclick="clearResult()" style="margin-left:8px;">清空</button>
        </div>
      </div>

      <div class="card">
        <h3>2. 选择演示场景</h3>
        <div id="scenarioList">Loading...</div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <h3>3. 处理流水线</h3>
        <div id="pipeline">
          <div class="step pending"><div class="icon">📝</div><div class="label">意图分类</div></div>
          <div class="step pending"><div class="icon">🔍</div><div class="label">API 查询</div></div>
          <div class="step pending"><div class="icon">🤖</div><div class="label">RPA 兜底</div></div>
          <div class="step pending"><div class="icon">⚖️</div><div class="label">决策引擎</div></div>
          <div class="step pending"><div class="icon">💰</div><div class="label">退款执行</div></div>
          <div class="step pending"><div class="icon">✉️</div><div class="label">回复生成</div></div>
        </div>
      </div>

      <div class="card">
        <h3>4. 处理结果</h3>
        <div id="resultArea" style="display:none;">
          <div class="result-area">
            <div id="resultMeta"></div>
            <hr style="margin:12px 0;">
            <strong>📬 系统回复：</strong>
            <pre id="resultResponse"></pre>
            <hr style="margin:12px 0;">
            <strong>📋 执行日志：</strong>
            <div class="log-box" id="resultLog"></div>
          </div>
        </div>
        <div id="resultEmpty" style="color:#999;text-align:center;padding:40px 0;">
          ⏳ 输入消息后点击"执行处理流程"
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const STEPS = ["classifier", "api_query", "rpa", "decision", "refund", "response"];
const STEP_LABELS = {
  classifier: { icon: "📝", label: "意图分类" },
  api_query:  { icon: "🔍", label: "API 查询" },
  rpa:        { icon: "🤖", label: "RPA 兜底" },
  decision:   { icon: "⚖️", label: "决策引擎" },
  refund:     { icon: "💰", label: "退款执行" },
  response:   { icon: "✉️", label: "回复生成" },
};

// Load scenarios
fetch("/api/scenarios")
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById("scenarioList");
    list.innerHTML = data.scenarios.map((s, i) => `
      <div class="scenario-btn ${i === 0 ? 'active' : ''}"
           onclick="selectScenario(${i}, '${s.order_id}', \`${s.customer_message.replace(/`/g,"\\`")}\`)">
        <strong>${s.name}</strong><br>
        <span style="font-size:12px;color:#666;">${s.description}</span>
      </div>
    `).join("");
  });

let selectedOrderId = "";
function selectScenario(idx, oid, msg) {
  document.querySelectorAll(".scenario-btn").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".scenario-btn")[idx].classList.add("active");
  document.getElementById("messageInput").value = msg;
  document.getElementById("orderIdInput").value = oid;
  selectedOrderId = oid;
}

function clearResult() {
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("resultEmpty").style.display = "block";
  document.querySelectorAll(".step").forEach(s => { s.className = "step pending"; s.querySelector(".detail")?.remove(); });
}

async function process() {
  const msg = document.getElementById("messageInput").value.trim();
  const oid = document.getElementById("orderIdInput").value.trim() || selectedOrderId;

  if (!msg) { alert("Please enter a customer message"); return; }

  // Reset UI
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("resultEmpty").style.display = "none";
  document.querySelectorAll(".step").forEach(s => {
    s.className = "step running";
    const detail = s.querySelector(".detail");
    if (detail) detail.remove();
  });

  try {
  const resp = await fetch("/api/process", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg, order_id: oid || null }),
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`服务器错误 (${resp.status}):\n\n${text}`);
  }
  const data = await resp.json();

    // Update pipeline
    const pipelineEl = document.getElementById("pipeline");

    // Map log entries to steps
    const logMap = {};
    data.log.forEach(line => {
      if (line.includes("[classifier]")) logMap.classifier = line.replace("[classifier] → ", "");
      if (line.includes("[api_query]")) logMap.api_query = line.replace("[api_query] ", "");
      if (line.includes("[rpa]")) logMap.rpa = line.replace("[rpa] ", "");
      if (line.includes("[decision]")) logMap.decision = line.replace("[decision] ", "");
      if (line.includes("[refund]")) logMap.refund = line.replace("[refund] ", "");
      if (line.includes("[response]")) logMap.response = line.replace("[response] ", "");
      if (line.includes("[human_review]")) { logMap.decision = "⚠️ Escalated to human review"; logMap.refund = "⏸️ Skipped"; }
    });

    const stepOrder = ["classifier", "api_query", "rpa", "decision", "refund", "response"];
    const children = pipelineEl.children;
    stepOrder.forEach((key, idx) => {
      if (idx < children.length) {
        const hasDetail = key in logMap;
        children[idx].className = "step done";
        if (hasDetail) {
          const existing = children[idx].querySelector(".detail");
          if (existing) existing.remove();
          const d = document.createElement("div");
          d.className = "detail";
          d.textContent = logMap[key];
          children[idx].appendChild(d);
        }
      }
    });

    // Show results
    document.getElementById("resultMeta").innerHTML = `
      <table>
        <tr><td><strong>工单 ID</strong></td><td>${data.ticket_id}</td></tr>
        <tr><td><strong>意图</strong></td><td>${data.intent} / ${data.subtype}</td></tr>
        <tr><td><strong>风险等级</strong></td>
          <td><span class="badge-risk-${data.risk}">${data.risk.toUpperCase()}</span></td></tr>
        <tr><td><strong>决策</strong></td><td>${data.decision_action}${data.refund_amount ? ' ($' + data.refund_amount + ')' : ''}</td></tr>
        <tr><td><strong>状态</strong></td><td>${data.status === 'pending_review' ? '⏳ 待人工审核' : '✅ 自动处理'}</td></tr>
      </table>
    `;
    document.getElementById("resultResponse").textContent = data.response;
    document.getElementById("resultLog").innerHTML = data.log.map(l => `<div>${l}</div>`).join("");
    document.getElementById("resultArea").style.display = "block";

  } catch(e) {
    document.getElementById("resultEmpty").style.display = "block";
    document.getElementById("resultEmpty").textContent = "❌ Error: " + e.message;
  }
}
</script>
</body>
</html>
