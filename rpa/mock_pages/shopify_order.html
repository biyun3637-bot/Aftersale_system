<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Shopify Order Page (Mock)</title>
<style>
  body{font-family:Arial,sans-serif;margin:40px;background:#f5f5f5}
  .order-card{background:#fff;padding:24px;border-radius:8px;max-width:600px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  h2{border-bottom:2px solid #eee;padding-bottom:8px}
  .row{display:flex;padding:6px 0}
  .label{width:140px;font-weight:600;color:#555}
  .value{flex:1}
  .badge{background:#e8f5e9;color:#2e7d32;padding:2px 10px;border-radius:12px;font-size:13px}
</style></head>
<body>
<div class="order-card">
  <h2>Order Detail</h2>
  <div class="row"><span class="label">Order ID</span><span class="value" id="order-id">ORD-004</span></div>
  <div class="row"><span class="label">Customer</span><span class="value">Dave</span></div>
  <div class="row"><span class="label">Amount</span><span class="value">$25.00</span></div>
  <div class="row"><span class="label">Status</span><span class="value" id="order-status"><span class="badge">In Transit</span></span></div>
  <div class="row"><span class="label">Tracking</span><span class="value" id="tracking-number">TRACK004</span></div>
  <div class="row"><span class="label">Carrier</span><span class="value">USPS</span></div>
  <div class="row"><span class="label">Last Update</span><span class="value">2026-06-10</span></div>
  <div class="row"><span class="label">Shipping To</span><span class="value">123 Main St, Anytown, USA</span></div>
</div>
</body></html>
